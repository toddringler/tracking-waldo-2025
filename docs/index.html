<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Waldo — Arctic Expedition Tracker</title>
  <meta name="description" content="Live Arctic expedition journal for Waldo, a 2024 Toyota Tacoma TRD Off-Road with Tune M1 camper. Tracking the journey north." />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">INITIALIZING WALDO SYSTEMS…</div>
  </div>

  <!-- Error Banner -->
  <div id="error-banner"></div>

  <!-- Header -->
  <header id="header">
    <div id="header-brand">
      <span id="header-icon">🚐</span>
      <div>
        <h1>Navigator's Log // Reconnaissance 2025</h1>
        <div id="header-subtitle">Waldo -- 2024 Tacoma OR TRD · Tune M1 · AT3WA</div>
      </div>
    </div>
    <div id="header-actions">
      <button class="btn" id="toggle-sidebar-btn" title="Show event log">
        📋 Events
      </button>
      <a href="waldo-entry.html" id="add-event-btn" class="btn btn-accent" title="Add a Waldo event">
        ✏️ Add Event
      </a>
    </div>
  </header>

  <!-- Sidebar Event Log -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2>Waldo Event Log</h2>
      <button id="sidebar-close" title="Close">✕</button>
    </div>
    <div id="sidebar-content">
      <p style="font-size:12px;color:var(--color-text-muted);font-style:italic;">Loading events…</p>
    </div>
  </aside>


  <!-- Photo Overlay -->
  <div id="photo-overlay" aria-hidden="true">
    <section id="photo-overlay-panel" role="dialog" aria-modal="true" aria-labelledby="photo-overlay-caption">
      <button id="photo-overlay-close" title="Close photo">✕</button>
      <img id="photo-overlay-image" alt="Event photo" />
      <p id="photo-overlay-caption"></p>
    </section>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Map Controls -->
  <div id="map-controls">
    <button class="map-btn active" id="btn-route" title="Toggle route">〰️</button>
    <button class="map-btn active" id="btn-events" title="Toggle events">📍</button>
    <button class="map-btn" id="btn-legend" title="Toggle legend">🗺️</button>
    <button class="map-btn" id="btn-fit" title="Fit to route">⛶</button>
  </div>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-title">Map Legend</div>
    <div class="legend-item">
      <div class="legend-line" style="background:var(--color-route)"></div>
      <span>Expedition Route</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--color-camp)"></div>
      <span>Camp</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--color-fuel)"></div>
      <span>Fuel Stop</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--color-sighting)"></div>
      <span>Sighting</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--color-incident)"></div>
      <span>Incident</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--color-ferry)"></div>
      <span>Ferry</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--color-current);box-shadow:0 0 0 3px rgba(240,165,0,0.3)"></div>
      <span>Last Position</span>
    </div>
  </div>

  <!-- Stats Strip -->
  <div id="stats-strip">
    <div class="stat-item">
      <span class="stat-label">Day</span>
      <span class="stat-value" id="stat-day">—</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Distance</span>
      <span class="stat-value" id="stat-distance">—</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Track Points</span>
      <span class="stat-value" id="stat-points">—</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Last Known Position</span>
      <span class="stat-value" id="stat-position">—</span>
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <script>
    (function() {
      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.async = false;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      // Prefer local overrides when present; otherwise fall back to shared config.
      loadScript('local-config.js')
        .then(() => {
          if (!window.WALDO_CONFIG || !window.WALDO_CONFIG.mapboxToken) {
            return loadScript('config.js');
          }
          return Promise.resolve();
        })
        .catch(() => loadScript('config.js'))
        .then(() => loadScript('map.js'));
    })();
  </script>
  <script>
    // Admin verification for Add Event button
    (function() {
      const ADMIN_TOKEN = 'add-event';
      const addEventBtn = document.getElementById('add-event-btn');
      
      // Check if already authenticated in this session
      if (sessionStorage.getItem('waldo_admin_verified') !== 'true') {
        addEventBtn.style.display = 'none';
      }
      
      // Check URL for admin token
      const params = new URLSearchParams(window.location.search);
      if (params.get('admin') === ADMIN_TOKEN) {
        sessionStorage.setItem('waldo_admin_verified', 'true');
        addEventBtn.style.display = 'block';
      }
    })();
  </script>
</body>
</html>
